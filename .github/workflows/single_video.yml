name: Generate Single Video

on:
  workflow_dispatch:
    inputs:
      topic:
        description: 'Custom topic (leave empty for AI)'
        required: false
        default: ''
      niche:
        description: 'Content niche'
        required: true
        default: 'motivation'
        type: choice
        options:
          - motivation
          - horror
          - reddit_story
          - brainrot
          - finance
      upload:
        description: 'Upload to YouTube?'
        required: true
        default: 'false'
        type: boolean

jobs:
  generate:
    name: Generate & Upload Single Short
    runs-on: ubuntu-latest
    env:
      NICHE: ${{ github.event.inputs.niche }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg

      - name: Pre-install build dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install "numpy>=1.26.0,<3.0.0"

      - name: Install Python dependencies
        run: |
          pip install \
            --use-pep517 \
            --resolver=backtracking \
            -r requirements.txt
          playwright install chromium --with-deps

      - name: Cache Kokoro model files
        id: cache-kokoro
        uses: actions/cache@v4
        with:
          path: |
            kokoro-v1.0.onnx
            voices.bin
          key: kokoro-models-v1

      - name: Download Kokoro model files (if not cached)
        if: steps.cache-kokoro.outputs.cache-hit != 'true'
        run: |
          curl -L -o kokoro-v1.0.onnx \
            "https://github.com/thewh1teagle/kokoro-onnx/releases/download/model-files/kokoro-v1.0.onnx"
          curl -L -o voices.bin \
            "https://github.com/thewh1teagle/kokoro-onnx/releases/download/model-files/voices.bin"
          ls -lh kokoro-v1.0.onnx voices.bin

      - name: Research or use custom topic
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          NICHE: ${{ env.NICHE }}
        run: |
          if [ -n "${{ github.event.inputs.topic }}" ]; then
            python -c "
          import json
          topic = '${{ github.event.inputs.topic }}'
          topics = [{
              'topic': topic,
              'hook': 'You need to hear this...',
              'angle': 'Unique perspective',
              'virality_score': 8,
              'emotion': 'curiosity',
              'source': 'manual'
          }]
          json.dump(topics, open('topics.json','w'), indent=2)
          print(f'Custom topic saved: {topic}')
          "
          else
            python main.py --mode research --niche "$NICHE" --topics-file topics.json
          fi

      - name: Generate video
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          NICHE: ${{ env.NICHE }}
        run: |
          set -o pipefail
          UPLOAD_FLAG=""
          if [ "${{ github.event.inputs.upload }}" = "true" ]; then
            UPLOAD_FLAG=""
          else
            UPLOAD_FLAG="--no-upload"
          fi
          python -u main.py \
            --mode single \
            --niche "$NICHE" \
            --video-id manual_001 \
            --video-index 0 \
            --topics-file topics.json \
            $UPLOAD_FLAG

      - name: Debug outputs
        if: always()
        run: |
          find /tmp -name "*.mp4" -exec ls -lh {} \; 2>/dev/null || echo "No MP4 files"

      - uses: actions/upload-artifact@v4
        with:
          name: generated-short-${{ github.event.inputs.niche }}
          path: /tmp/manual_001_final.mp4
          retention-days: 7
