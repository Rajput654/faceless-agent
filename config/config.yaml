video:
  # FIXED: PyYAML does NOT expand "${NICHE:-motivation}" shell syntax — it reads
  # it as the literal string. main.py resolves the real niche and overwrites this
  # value at runtime, so changing the default here to "motivation" is safe and
  # avoids confusing logs like niche='${NICHE:-motivation}'.
  niche: "motivation"
  daily_count: 10
  duration_seconds: 55
  resolution: "1080x1920"
  fps: 30
  quality_threshold: 0.70
  max_retries: 3

voice:
  primary: "en-US-GuyNeural"
  fallback: "en-US-AriaNeural"
  rate: "+10%"
  pitch: "+0Hz"
  volume: "+0%"

llm:
  # FIXED: was "llama3-70b-8192" (old model ID) but script_writer.py defaults
  # to "llama-3.3-70b-versatile". Aligning config with the agent default.
  primary_model: "llama-3.3-70b-versatile"
  fallback_model: "llama3-8b-8192"
  temperature: 0.8
  max_tokens: 2000
  timeout: 30

images:
  provider: "pexels_video"
  style: "cinematic"
  count_per_scene: 1
  width: 1080
  height: 1920

music:
  provider: "pixabay"
  duration_seconds: 60
  volume_reduction: 0.12

youtube:
  category_id: "22"
  language: "en"
  made_for_kids: false
  privacy: "public"
  post_times:
    - "08:00"
    - "09:30"
    - "11:00"
    - "12:30"
    - "14:00"
    - "15:30"
    - "17:00"
    - "18:30"
    - "20:00"
    - "21:30"

reddit:
  subreddits:
    motivation:
      - "GetMotivated"
      - "selfimprovement"
      - "LifeProTips"
    horror:
      - "nosleep"
      - "LetsNotMeet"
      - "creepyencounters"
    reddit_story:
      - "TIFU"
      - "AmItheAsshole"
      - "relationship_advice"
    brainrot:
      - "memes"
      - "dankmemes"
    finance:
      - "personalfinance"
      - "investing"
      - "wallstreetbets"
  post_limit: 50
  min_score: 1000

database:
  topics_table: "topics"
  videos_table: "videos"
  analytics_table: "analytics"
